<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
<body class="login-body">

    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="School Logo">
        </div>

        <!-- Title -->
        <h1 class="login-title">SCHOOL MANAGEMENT</h1>
        <p class="login-subtitle">System</p>

        <!-- Role Buttons -->
        <div class="role-buttons">
            <button class="role-btn active" data-role="staff" onclick="selectRole(this)">
                👨‍💼 Staff
            </button>
            <button class="role-btn" data-role="student" onclick="selectRole(this)">
                👨‍🎓 Student
            </button>
        </div>

        <!-- Error Message -->
        {% if error %}
        <div class="error-msg">
            ❌ {{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="/login" id="loginForm">
            <input type="hidden" name="role" id="roleInput" value="staff">

            <div class="input-group">
                <label>👤 Username / ID</label>
                <input 
                    type="text" 
                    name="username" 
                    id="username"
                    placeholder="Enter username" 
                    required
                    autocomplete="off"
                >
            </div>

            <div class="input-group">
                <label>🔒 Password</label>
                <input 
                    type="password" 
                    name="password" 
                    id="password"
                    placeholder="Enter password" 
                    required
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                LOGIN
            </button>
        </form>

        <!-- Copyright -->
        <p class="copyright">
            © 2026 Created By Abdifatah Said
        </p>

    </div>

    <script>
        // Role Selection
        function selectRole(btn) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('roleInput').value = btn.dataset.role;

            const username = document.getElementById('username');
            if (btn.dataset.role === 'student') {
                username.placeholder = 'Enter your Student ID (e.g. CS401)';
            } else {
                username.placeholder = 'Enter username';
            }
        }

        // Login Button Animation
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span class="spinner"></span> Logging in...';
            btn.disabled = true;
        });
    </script>

</body>
</html>
